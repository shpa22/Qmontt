<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us | Qmontt AB</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .page-hero {
            height: 50vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1504917595217-d4dc5ebe6122?w=1600') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        .page-hero h1 {
            font-size: 4rem;
            font-weight: 800;
        }
        
        .main-heading {
            font-size: 3rem;
            text-align: center;
            color: var(--dark);
            margin-bottom: 2rem;
        }
        
        .intro-text {
            text-align: center;
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 5rem;
            color: var(--text);
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .content-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
            margin-bottom: 5rem;
        }
        
        .content-row.reverse {
            grid-template-columns: 1fr 1fr;
        }
        
        .content-row.reverse .content-text {
            order: 2;
        }
        
        .content-row.reverse .content-image-wrapper {
            order: 1;
        }
        
        .content-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .content-text h2 {
            font-size: 2.5rem;
            color: var(--dark);
            margin-bottom: 1.5rem;
        }
        
        .content-text p {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text);
        }
        
        .mission-box, .vision-box {
            background: var(--light);
            padding: 2.5rem;
            border-left: 5px solid var(--secondary);
            border-radius: 10px;
            font-style: italic;
            font-size: 1.2rem;
            line-height: 1.8;
        }
        
        .final-quote {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 4rem 2rem;
            text-align: center;
            margin-top: 6rem;
        }
        
        .final-quote h2 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            line-height: 1.3;
            color: white;
        }
        
        @media (max-width: 768px) {
            .content-row, .content-row.reverse {
                grid-template-columns: 1fr;
            }
            .content-row.reverse .content-text,
            .content-row.reverse .content-image-wrapper {
                order: 0;
            }
            .page-hero h1 {
                font-size: 2.5rem;
            }
            .main-heading {
                font-size: 2rem;
            }
            .final-quote h2 {
                font-size: 2rem;
            }
        }
    </style>
</head>
